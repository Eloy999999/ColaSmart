<!DOCTYPE html>
<html class="h-100" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/head :: header}" />
    <meta charset="UTF-8">
    <title>Modificar Cola</title>
</head>

<body class="d-flex flex-column h-100">

<header th:replace="~{fragments/nav.html :: nav}"></header>

<main class="flex-shrink-0">
    <div th:if="${u != null and u.hasRole('ADMIN')}" class="container">
        <h1>Modificar cola con id <span th:text="${cola.id}"></span></h1>

        <form class="row g-3 mt-4" 
              th:action="@{/vista5/colas/editar/{id}(id=${cola.id})}" 
              method="post">

            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" name="id" th:value="${cola.id}">

            <div class="col-md-6">
                <label class="form-label">Nombre servicio</label>
                <input type="text" name="nombre" class="form-control"
                       th:value="${cola.nombre}" required>
            </div>

            <div class="col-md-6">
                <label class="form-label">Tiempo estimado (min)</label>
                <input type="number" name="tiempo" class="form-control"
                       th:value="${cola.tiempo}" required>
            </div>

            <div class="col-md-6">
                <label class="form-label">Aforo máximo</label>
                <input type="number" name="capacidad" class="form-control"
                       th:value="${cola.capacidad}" required>
            </div>

            <div class="col-6">
                <label class="form-label">Ubicación</label>
                <input type="text" name="lugar" class="form-control"
                       th:value="${cola.lugar}" required>
            </div>

            <div class="col-md-6">
                <label class="form-label">Horario inicio</label>
                <input type="datetime-local" name="horarioInicio" class="form-control"
                       th:value="${cola.horarioInicio}">
            </div>

            <div class="col-md-6">
                <label class="form-label">Horario fin</label>
                <input type="datetime-local" name="horarioFin" class="form-control"
                       th:value="${cola.horarioFin}">
            </div>

            <button type="submit" class="btn btn-primary mt-3">Guardar cambios</button>

        </form>
    </div>

    <div th:unless="${u != null and u.hasRole('ADMIN')}" class="container text-center mt-5">
        <div class="alert alert-danger">
            <h2>Solo administradores</h2>
        </div>
    </div>
</main>

</body>
</html>
