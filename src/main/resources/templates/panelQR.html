<!DOCTYPE html>
<html class="h-100" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/head :: header}" />
    <title>Panel QR</title>

    <!-- Carga Bootstrap desde un CDN para usar estilos predefinidos -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Librería para generar códigos QR dinámicamente en el navegador -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <!-- Librería STOMP para comunicarse por WebSocket con el servidor -->
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7/bundles/stomp.umd.min.js"></script>

    <style>
        .panel-card {
            background: rgba(255, 255, 255, 0.75);
            color: #1a1a1a;
            border-radius: 16px;
            padding: 1.5rem;
            backdrop-filter: blur(8px);
            box-shadow: 0 4px 24px rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,255,0.9);
        }

        /* Fuerza el color oscuro del texto dentro de la tarjeta */
        .panel-card h1, .panel-card h2, .panel-card div, .panel-card p {
            color: #1a1a1a !important;
        }
        .titulo-cola {
            background: rgba(255, 255, 255, 0.75);
            color: #1a1a1a !important;
            border-radius: 16px;
            padding: 0.5rem 2rem;
            backdrop-filter: blur(8px);
            box-shadow: 0 4px 24px rgba(0,0,0,0.15);
            display: inline-block;
        }

        /* Estilo de cada turno atendido mostrado en la lista */
        .item-atendido {
            min-height: 60px;
            background: rgba(0,0,0,0.05);
            border-radius: 8px;
            padding: 0.75rem;
        }
    </style>
</head>

<!-- El body usa como fondo una imagen asociada a la cola actual -->
<body class="d-flex flex-column h-100"
      th:style="'background-image: url(/colas/' + ${cola.id} + '/imagen); background-size: cover; background-position: center;'">

<main class="flex-shrink-0 mt-4">

    <div class="container text-center mt-4">
        <h1 class="fw-bold titulo-cola" style="font-size: 60px; letter-spacing: 4px;"
            th:text="'' + ${cola.nombre}">Cola</h1>
    </div>

    <div class="container mt-4">
        <div class="row g-4">

            <!-- LADO IZQUIERDO: TURNOS LLAMADOS -->
            <div class="col-md-6">
                <div class="panel-card text-center">
                    <h2 class="fw-bold mb-4" style="font-size: 40px;">TURNOS LLAMADOS</h2>
                    <div id="contenedor-atendidos" class="d-flex flex-column gap-3" style="font-size: 20px;">
                        <div th:each="user : ${atendidos}"
                             class="item-atendido"
                             th:text="${user != null} ? ${user.username} + ' - ' + ${user.lugar} : ''">
                        </div>
                    </div>
                </div>
            </div>

            <!-- LADO DERECHO: QR Y TURNO ACTUAL -->
            <div class="col-md-6">
                <div class="panel-card text-center">
                    <div class="fw-bold mb-3" style="font-size: 40px;">ESCANEE EL QR</div>

                <!-- QR dinámico -->
                <div id="qrcode" class="mb-3 d-flex justify-content-center" th:title="${'https://vm044.containers.fdi.ucm.es/tuTurno'}"></div>
                <script th:inline="javascript">
                    const path = /*[[@{/user/newQRuser(token=${cola.qrToken})}]]*/ '';
                    const url = location.href.split("/").slice(0, -2).join("/") + path;
                    console.log("QR URL:", url);
                    new QRCode(document.getElementById("qrcode"), url);
                </script>

                    <!-- <div id="turno-actual" class="fw-bold mt-3"
                         style="font-size: 80px;"
                         th:if="${turnoActual != null}"
                         th:text="${turnoActual.username} + ' - ' + (${turnoActual.lugar} != null ? ${turnoActual.lugar} : 'Puesto ?')">
                    </div> -->
                    <div id="turno-actual" class="fw-bold mt-3" style="font-size: 80px;">
                        <span th:if="${turnoActual != null}" th:text="${turnoActual.username} + ' - ' + (${turnoActual.lugar} != null ? ${turnoActual.lugar} : 'Puesto ?')"></span>
                    </div>
                </div>
            </div>

        </div>
    </div>
</main>

<div class="text-center my-4">
    <a th:href="@{/user/newQRuser(token=${cola.qrToken})}" class="btn btn-primary btn-lg">
        Escanear QR
    </a>
</div>

<!-- Script principal para actualizar el panel en tiempo real -->
<script th:inline="javascript">
    const csrfToken = /*[[${_csrf.token}]]*/ '';
    const colaId = /*[[${cola.id}]]*/ '';

    console.log('colaId:', colaId);

    // Usa ws o wss según si la página está en http o https
    const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    
    // Crea el cliente STOMP para conectarse al WebSocket del servidor
    const stompClient = new StompJs.Client({
        brokerURL: wsProtocol + '//' + window.location.host + '/ws',
        reconnectDelay: 5000,
        connectHeaders: { 'X-CSRF-TOKEN': csrfToken }
    });

    // Cuando la conexión con el WebSocket se establece correctamente
    stompClient.onConnect = function () {
        // Se suscribe al topic de actualizaciones de esta cola
        stompClient.subscribe(`/topic/cola/${colaId}/actualizar`, async function (msg) {
            // Pide al servidor el detalle actualizado de la cola en formato JSON
            const res = await fetch(`/colas/${colaId}/detalle`);
            const cola = await res.json();

            // Turno actual = posicion first - 1
            const posActual = cola.first - 1;
            // Busca en la lista de clientes quién tiene esa posición
            const actual = cola.listaClientes.find(c => c.posicion === posActual);

            // Actualiza el texto del turno actual en pantalla
            const divTurno = document.getElementById('turno-actual');
            if (divTurno) {
                divTurno.textContent = actual
                    ? `${actual.username} - ${actual.lugar || 'Puesto ?'}` : '';
            }

            // Turnos llamados, incluyendo el turno actual
            const atendidos = [];
            for (let i = posActual; atendidos.length < 6 && i >= 0; i--) {
                const u = cola.listaClientes.find(c => c.posicion === i);
                if (u) atendidos.push(u);
            }

            // Actualiza visualmente la lista de atendidos
            const contenedor = document.getElementById('contenedor-atendidos');
            if (contenedor) {
                if (atendidos.every(a => a === null)) {
                    contenedor.innerHTML = '<div class="item-atendido"></div>';
                } else {
                    contenedor.innerHTML = atendidos.map(c => `
                        <div class="item-atendido">
                            ${c ? c.username + ' - ' + (c.lugar || 'Puesto ?') : ''}
                        </div>`).join('');
                }
            }
        });
    };

    // Manejo de errores STOMP
    stompClient.onStompError = function (frame) {
        console.error('NO OK panelQR Error STOMP:', frame);
    };

    // Activa la conexión WebSocket
    stompClient.activate();
</script>

</body>
</html>
