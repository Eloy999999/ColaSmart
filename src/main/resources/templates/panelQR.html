<!DOCTYPE html>
<html class="h-100" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/head :: header}" />
    <title>Panel QR</title> <!-- antiguo vista 1 -->

    <!-- Bootstrap (para tipografía y estilos) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Librería QRCode -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <!-- Stomp-->
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7/bundles/stomp.umd.min.js"></script>

</head>
<body class="d-flex flex-column h-100">

<!-- Cabecera Thymeleaf -->
<header th:replace="~{fragments/nav.html :: nav}"></header>

<main class="flex-shrink-0 mt-4">
    <!-- Nombre de la cola arriba como titulo-->
    <div class="container text-center mt-4">
        <h1 class="fw-bold" style="font-size: 60px; letter-spacing: 4px;"
            th:text="'Cola ' + ${cola.nombre}">
            Cola
        </h1>
    </div>
    <div class="container">
        <div class="row">

            <!-- LADO IZQUIERDO: TURNOS LLAMADOS -->
            <div class="col-md-6">
                <div class="turnos-llamados text-center mb-4">
                    <h2 class="fw-bold mb-4" style="font-size: 40px;">TURNOS LLAMADOS</h2>
                    <div class="d-flex flex-column gap-3" style="font-size: 20px;">
                        <div class="d-flex flex-column gap-3" style="font-size: 20px;">
                            <div th:each="user : ${atendidos}"
                                class="p-3 bg-light rounded border"
                                style="min-height: 60px;"
                                th:text="${user != null} ? ${user.username} + ' - Puesto 1'">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- LADO DERECHO: ESCANEAR QR Y TURNO ACTUAL -->
            <div class="col-md-6 text-center">
                <div class="mb-3 fw-bold" style="font-size: 40px;">ESCANEE EL QR</div>

                <!-- QR dinámico -->
                <div id="qrcode" class="mb-3 d-flex justify-content-center"></div>
                <script th:inline="javascript">
                    const url = /*[[@{/user/newQRuser}]]*/ '/user/newQRuser';
                    new QRCode(document.getElementById("qrcode"), url);
                </script>

                <div class="fw-bold"
                    style="font-size: 80px; color: #000;"
                    th:if="${turnoActual != null}"
                    th:text="${turnoActual.username} + ' - Puesto 1'">
                </div>
            </div>

        </div>
    </div>
</main>

<!-- BOTÓN PAUSA -->
<button class="btn btn-dark position-fixed bottom-0 start-0 m-3" onclick="mostrarPausa()">Pausa</button>


<div class="text-center my-4">
    <a th:href="@{/user/newQRuser}" class="btn btn-primary btn-lg">
        Escanear QR
    </a>
</div>

<!-- OVERLAY -->
<div class="position-fixed top-0 start-0 w-100 h-100 d-none justify-content-center align-items-center flex-column text-center bg-light" id="overlay" style="z-index: 9999;">
    <div style="font-size: 60px; letter-spacing: 8px; font-weight: 300; margin-bottom: 20px;">VOLVEMOS EN</div>
    <div style="font-size: 180px; font-weight: 900; line-height: 1;">5</div>
    <div style="font-size: 50px; letter-spacing: 6px; margin-top: 10px;">MINUTOS</div>
    <button class="btn btn-dark mt-3" onclick="ocultarPausa()">Volver</button>
</div>

<script>
    function mostrarPausa() {
        document.getElementById("overlay").classList.remove("d-none");
        document.getElementById("overlay").classList.add("d-flex");
    }

    function ocultarPausa() {
        document.getElementById("overlay").classList.remove("d-flex");
        document.getElementById("overlay").classList.add("d-none");
    }
</script>

<script th:inline="javascript">
    const csrfToken = /*[[${_csrf.token}]]*/ '';
    const colaId = /*[[${cola.id}]]*/ '';

    console.log('colaId:', colaId); //logs depuración

    const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const stompClient = new StompJs.Client({
        brokerURL: wsProtocol + '//' + window.location.host + '/ws',
        reconnectDelay: 5000,
        connectHeaders: { 'X-CSRF-TOKEN': csrfToken }
    });

    stompClient.onConnect = function () {
        console.log('OK panelQR STOMP conectado, cola:', colaId); //logs depuración

        stompClient.subscribe(`/topic/cola/${colaId}/actualizar`, async function (msg) {
            console.log('OK panelQR recibió mensaje:', msg.body); //logs depuración

            const res = await fetch(`/colas/${colaId}/detalle`);
            const cola = await res.json();

            const ordenados = cola.listaClientes
                .slice()
                .sort((a, b) => a.posicion - b.posicion);

            // Turno actual (posicion 0)
            const actual = ordenados.find(c => c.posicion === 0);
            const divTurno = document.querySelector('.fw-bold[style*="80px"]');
            if (divTurno) {
                divTurno.textContent = actual ? actual.username + ' - Puesto 1' : '';
            }

            // Lista de atendidos (posicion negativa)
            const atendidos = ordenados
                .filter(c => c.posicion < 0)
                .sort((a, b) => b.posicion - a.posicion) // -1 primero, luego -2, etc.
                .slice(0, 5);

            const contenedor = document.querySelector('.d-flex.flex-column.gap-3 .d-flex.flex-column.gap-3');
            if (contenedor) {
                if (atendidos.length === 0) {
                    contenedor.innerHTML = '<div class="p-3 bg-light rounded border" style="min-height: 60px;"></div>';
                } else {
                    contenedor.innerHTML = atendidos.map(c => `
                        <div class="p-3 bg-light rounded border" style="min-height: 60px;">
                            ${c.username} - Puesto 1
                        </div>`).join('');
                }
            } else {
                console.warn('No se encontró el contenedor de atendidos');
            }
        });
    };

    stompClient.onStompError = function (frame) {
        console.error('NO OK panelQR Error STOMP:', frame); //logs depuración
    };

    stompClient.activate();
</script>

</body>
</html>
