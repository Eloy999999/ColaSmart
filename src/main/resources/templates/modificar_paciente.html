<!DOCTYPE html>
<html class="h-100" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/head :: header}" />
    <meta charset="UTF-8">
    <title>Modificar Paciente</title>
</head>

<body class="d-flex flex-column h-100">
<header th:replace="~{fragments/nav.html :: nav}"></header>

<main class="flex-shrink-0">
    <div th:if="${u != null and u.hasRole('ADMIN')}" class="container">
        <h1>Modificar paciente con id <span th:text="${paciente.id}"></span></h1>

        <form class="row g-3 mt-4"
              th:action="@{/user/editarPaciente/{id}(id=${paciente.id})}"
              method="post">

            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" name="id" th:value="${paciente.id}">

            <div class="col-md-6">
                <label class="form-label">Turno</label>
                <input type="text" name="turno" class="form-control"
                       th:value="${paciente.posicion}" required>
            </div>
            
            <div class="col-md-6">
                <label class="form-label">Cola</label>
                <select name="colaId" class="form-control" required>
                    <option value="">-- Selecciona una cola --</option>
                    <option th:each="cola : ${colas}"
                            th:value="${cola.id}"
                            th:text="${cola.nombre}"
                            th:selected="${colaDelPaciente != null and cola.id == colaDelPaciente.id}">
                    </option>
                </select>
            </div>
        
            <button type="submit" class="btn btn-primary mt-3">Guardar cambios</button>
        </form>
    </div>

    <div th:unless="${u != null and (u.hasRole('ADMIN') or u.hasRole('ORGANIZADOR'))}" class="container text-center mt-5">
        <div class="alert alert-danger">
            <h2>Solo trabajadores</h2>
        </div>
    </div>
</main>

</body>
</html>
