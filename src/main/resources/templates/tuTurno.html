<!DOCTYPE html>
<html class="h-100" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/head :: header}" />
    <meta charset="UTF-8">
    <title>Tu turno</title> <!-- antiguo vista 2 -->
    <style>
        /* Contenedor centrado para el mensaje de turno */
        #turno-display {
            display: none; /* oculto al inicio */
            height: 100vh;
            width: 100vw;
            text-align: center;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
    </style>
    <!-- Stomp -->
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7/bundles/stomp.umd.min.js"></script>
    <meta name="_csrf" th:content="${_csrf.token}"/>
</head>

<body class="d-flex flex-column h-100">

<header th:replace="~{fragments/nav.html :: nav}"></header>

<main class="flex-shrink-0" id="main-content">
    <div class="container mt-4">

        <div class="row align-items-center">

            <!-- IZQUIERDA: información -->
            <div class="col-md-6">
                <p class="fs-2"><strong>Tipo de servicio:</strong> <span th:text="${cola.nombre}">Atención Secretaría</span></p>
                <p class="fs-2"><strong>Tiempo estimado:</strong> <span th:text="${cola.tiempo * posicion + ' minutos'}">15 minutos</span></p>
                <p class="fs-2"><strong>Posición en la cola:</strong> <span th:text="${user.posicion}">3</span></p>
            </div>

            <!-- DERECHA: puesto en cola grande -->
            <div class="col-md-6 text-center">
                <h1 class="fw-bold text-primary" style="font-size: 8rem;"><span th:text="${user.username}">B743</span></h1>
                <p class="fs-4">Tu turno</p>
            </div>

        </div>

        <!-- BOTONES ABAJO -->
        <div class="row mt-5">
            <!-- PARA DESPUÉS: <div class="col-6 text-start" th:if="${user != null and user.hasRole('ADMIN')}"> -->
            <div class="col-6 text-start">
                <button type="button" class="btn btn-success btn-lg" id="btn-turno">
                    Tu turno
                </button>
            </div>

            <div class="col-6 text-end">
                <button type="button" class="btn btn-danger btn-lg" id="btn-abandonar">
                    Abandonar la cola
                </button>
            </div>
        </div>

    </div>
</main>

<!-- Contenedor del mensaje central (sin d-flex) -->
<div id="turno-display">
    <p style="font-size: 4rem; font-weight: bold;">Es tu turno</p>
    <h1 class="fw-bold text-primary" style="font-size: 10rem;"><span th:text="${user.username}">B743</span></h1>
    <p style="font-size: 2rem;">Dirígete al puesto 2</p>
</div>

<script th:inline="javascript">
    const btnTurno = document.getElementById('btn-turno');
    const btnAbandonar = document.getElementById('btn-abandonar');
    const mainContent = document.getElementById('main-content');
    const turnoDisplay = document.getElementById('turno-display');

    const posicion = /*[[${user.posicion}]]*/ 0;

    function mostrarTurno() {
        mainContent.style.display = 'none';
        turnoDisplay.style.display = 'flex';
        turnoDisplay.style.flexDirection = 'column';
        turnoDisplay.style.justifyContent = 'center';
        turnoDisplay.style.alignItems = 'center';
    }

    // Botón verde: muestra mensaje central
    btnTurno.addEventListener('click', mostrarTurno);

    // Botón rojo: redirige a vista 1
    btnAbandonar.addEventListener('click', () => {
    const seguro = confirm("¿Seguro que quieres abandonar la cola?");
    
    if (seguro) {
        window.location.href = '/panelQR';
    }

    if (posicion <= 0) {
        mostrarTurno();
    }

    });
    
    const csrfToken = document.querySelector('meta[name="_csrf"]').content;
    const colaId = /*[[${cola.id}]]*/ '';
    const userId = /*[[${user.id}]]*/ '';

    const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const stompClient = new StompJs.Client({
        brokerURL: wsProtocol + '//' + window.location.host + '/ws',
        reconnectDelay: 5000,
        connectHeaders: { 'X-CSRF-TOKEN': csrfToken }
    });

    stompClient.onConnect = function () {
        stompClient.subscribe(`/topic/cola/${colaId}/actualizar`, async function () {
            const res = await fetch(`/colas/${colaId}/detalle`);
            const cola = await res.json();

            // Buscar la posición actualizada de este usuario
            const yo = cola.listaClientes.find(c => c.id == userId);

            if (!yo) return; // ya fue eliminado

            // Actualizar posición en pantalla
            document.querySelector('[th\\:text="${user.posicion}"]')
                ?.closest('p')
                ?.querySelector('span')
                && (document.querySelector('span[th\\:text]').textContent = yo.posicion);

            // Actualizar tiempo estimado
            const spanTiempo = document.querySelectorAll('.fs-2 span')[1];
            if (spanTiempo) spanTiempo.textContent = (cola.tiempo * yo.posicion) + ' minutos';

            // Si es su turno (posicion 0), mostrar pantalla de turno
            if (yo.posicion <= 0) {
                mostrarTurno();
            }
        });
    };

    stompClient.activate();
</script>

</body>
</html>
