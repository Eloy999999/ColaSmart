<!DOCTYPE html>
<html class="h-100" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/head :: header}" />
    <meta charset="UTF-8">
    <title>Tu turno</title> <!-- antiguo vista 2 -->
    <style>
        /* Pantalla que se muestra cuando llega el turno del usuario */
        #turno-display {
            display: none;
            height: 100vh;
            width: 100vw;
            text-align: center;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
    </style>

    <!-- Cliente STOMP para recibir actualizaciones de la cola por WebSocket -->
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7/bundles/stomp.umd.min.js"></script>
    <meta name="_csrf" th:content="${_csrf.token}"/>
</head>

<body class="d-flex flex-column h-100">

<header th:replace="~{fragments/nav.html :: nav}"></header>

<main class="flex-shrink-0" id="main-content">
    <div class="container mt-4">

        <div class="row align-items-center">

            <!-- IZQUIERDA: información -->
            <div class="col-md-6">
                <p class="fs-2">
                    <strong>Tipo de servicio:</strong>
                    <span th:text="${cola.nombre}">Atención Secretaría</span>
                </p>

                <p class="fs-2">
                    <strong>Tiempo estimado:</strong>
                    <span id="tiempo-span"
                          th:text="${cola.tiempo * (user.getPosicion()+1 - cola.getFirst()) + ' minutos'}">
                        15 minutos
                    </span>
                </p>

                <p class="fs-2">
                    <strong>Posición en la cola:</strong>
                    <span id="posicion-span"
                          th:text="${user.getPosicion()+1 - cola.getFirst()}">
                        3
                    </span>
                </p>
            </div>

            <!-- DERECHA: puesto en cola grande -->
            <div class="col-md-6 text-center">
                <h1 class="fw-bold text-primary" style="font-size: 8rem;">
                    <span th:text="${user.username}">B743</span>
                </h1>
                <p class="fs-4">Tu turno</p>
            </div>

        </div>

       <div th:if="${mensajeAviso != null}" class="alert alert-info my-3 shadow-sm" style="border-left: 5px solid #0dcaf0;">
            <h5 class="alert-heading">Aviso de la consulta:</h5>
            <p th:text="${mensajeAviso.text}" style="font-size: 1.25rem; font-weight: 500;" class="mb-1"></p>
            <hr class="my-2">
            <small class="text-muted">
                Enviado a las <span th:text="${#temporals.format(mensajeAviso.dateSent, 'HH:mm')}">12:30</span>
            </small>
        </div>

        <!-- BOTONES ABAJO -->
        <!-- Acción para abandonar la cola -->
        <div class="row mt-5">
            <div class="col-12 text-center">
                <button type="button" class="btn btn-danger btn-lg" id="btn-abandonar">
                    Abandonar la cola
                </button>
            </div>
        </div>

        <!-- Botón para recargar la cola -->
        <div class="row mt-5">
            <div class="col-12 text-center">
                <button type="button" class="btn btn-primary btn-lg" id="btn-recargar">
                    Recargar
                </button>
            </div>
        </div>

        <!-- Formulario oculto enviado al confirmar abandonar la cola -->
        <form id="form-abandonar"
              th:action="@{/user/salir_de_cola/{id}(id=${user.id})}"
              method="post"
              style="display:none;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <!-- Redirige de vuelta al panel QR después de abandonar la cola -->
            <input type="hidden" name="redirect" th:value="@{/panelQR/{_id}(_id=${cola.id})}">
        </form>

    </div>
</main>

<!-- Pantalla grande de aviso cuando llega el turno -->
<div id="turno-display">
    <p style="font-size: 4rem; font-weight: bold;">Es tu turno</p>
    <h1 class="fw-bold text-primary" style="font-size: 10rem;">
        <span th:text="${user.username}">B743</span>
    </h1>
    <p id="puesto-turno" style="font-size: 2rem;">Dirígete al puesto</p>
</div>

<script th:inline="javascript">
    // Elems principales vista
    const btnAbandonar = document.getElementById('btn-abandonar');
    const btnRecargar = document.getElementById('btn-recargar');
    const mainContent = document.getElementById('main-content');
    const turnoDisplay = document.getElementById('turno-display');

    // Cambia de la vista normal a la pantalla de turno activo
    function mostrarTurno() {
        mainContent.style.display = 'none';
        turnoDisplay.style.display = 'flex';
        turnoDisplay.style.flexDirection = 'column';
        turnoDisplay.style.justifyContent = 'center';
        turnoDisplay.style.alignItems = 'center';
    }

    // Confirma y envía el formulario oculto para abandonar la cola
    btnAbandonar.addEventListener('click', () => {
        const seguro = confirm("¿Seguro que quieres abandonar la cola?");
        if (seguro) {
            document.getElementById('form-abandonar').submit();
        }
    });

    // Listener para recargar al darle al boton correspondiente
    btnRecargar.addEventListener('click', () => {
        window.location.reload();
    });

    // Valores generados por Thymeleaf al renderizar la página
    const csrfToken = document.querySelector('meta[name="_csrf"]').content;
    const colaId = /*[[${cola.id}]]*/ '';
    const userId = /*[[${user.id}]]*/ '';

    console.log("tuturno: colaId =", colaId, "| userId =", userId);

    // Usa ws en HTTP y wss en HTTPS
    const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';

    // Cliente STOMP para escuchar cambios de la cola
    const stompClient = new StompJs.Client({
        brokerURL: wsProtocol + '//' + window.location.host + '/ws',
        reconnectDelay: 5000,
        connectHeaders: { 'X-CSRF-TOKEN': csrfToken }
    });

    stompClient.onConnect = function () {
        console.log("tuturno: STOMP conectado, suscribiendo a /topic/cola/" + colaId + "/actualizar");

        // Suscripción al canal de actualización de esta cola
        stompClient.subscribe(`/topic/cola/${colaId}/actualizar`, async function (msg) {
            console.log("tuturno: mensaje WebSocket recibido");

            if (msg && msg.body) {
                try {
                    const data = JSON.parse(msg.body);
                    if (data.tipo === 'NUEVO_AVISO') {
                        console.log("tuturno: Es un aviso del foro. Recargando página entera...");
                        window.location.reload(); 
                        return; // Detiene la ejecución aquí para que no ejecute el fetch de abajo
                    }
                } catch (e) {
                    console.error("Error al parsear el mensaje del WebSocket:", e);
                }
            }

            // Se consulta el estado actualizado de la cola
            const res = await fetch(`/colas/${colaId}/detalle`);
            const cola = await res.json();

            console.log("tuturno: cola.first =", cola.first, "| cola.tiempo =", cola.tiempo);
            console.log("tuturno: listaClientes =", cola.listaClientes);

            // Localiza al usuario actual dentro de la lista actualizada
            const yo = cola.listaClientes.find(c => c.id == userId);
            console.log("tuturno: yo =", yo);

            if (!yo) {
                console.warn("tuturno: usuario NO encontrado en listaClientes");
                return;
            }

            // Posición relativa en la cola
            const posRelativa = yo.posicion + 1 - cola.first;
            console.log("tuturno: posRelativa =", posRelativa);

            // Actualizar posición en pantalla
            const spanPosicion = document.querySelector('#posicion-span');
            if (spanPosicion) spanPosicion.textContent = posRelativa;

            // Actualizar tiempo estimado
            const spanTiempo = document.querySelector('#tiempo-span');
            if (spanTiempo) spanTiempo.textContent = (cola.tiempo * posRelativa) + ' minutos';

            // El turno actual corresponde a la posición first - 1
            if (yo.posicion === cola.first - 1) {
                console.log("tuturno: ES TU TURNO");

                const puestoP = document.getElementById('puesto-turno');
                if (puestoP) puestoP.textContent = 'Dirígete a ' + (yo.lugar || 'tu puesto');

                mostrarTurno();
            }
        });
    };

    // Error STOMP recibido desde el broker
    stompClient.onStompError = function (frame) {
        console.error("tuturno: error STOMP", frame);
    };

    // Desconexión STOMP; reconnectDelay intentará reconectar
    stompClient.onDisconnect = function () {
        console.warn("tuturno: STOMP desconectado");
    };

    // Inicia la conexión WebSocket/STOMP
    stompClient.activate();

    // Recarga automática cada minuto
    window.setInterval(() => {
        window.location.reload();
    }, 60 * 1000);
</script>

</body>
</html>
