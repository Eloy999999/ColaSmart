<!DOCTYPE html>
<html class="h-100" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/head :: header}" />
    <meta charset="UTF-8">
    <title>Colas asignadas al trabajador</title> <!-- antiguo vista 4 -->

        <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7/bundles/stomp.umd.min.js"></script>
    <style>
        #modalDetalle {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: var(--bs-body-bg, #fff);
            overflow-y: auto;
            padding: 2rem;
        }
        #modalDetalle.visible {
            display: block;
        }
        tr.fila-cola {
            cursor: pointer;
            transition: background 0.15s;
        }
        tr.fila-cola:hover {
            background-color: rgba(13,110,253,0.08) !important;
        }
    </style>
</head>

<body class="d-flex flex-column h-100">
<header th:replace="~{fragments/nav.html :: nav}"></header>

<main class="flex-shrink-0">
<div th:if="${u != null and u.hasRole('ADMIN') or u != null and u.hasRole('ORGANIZADOR')}" class="container">

    <!-- Enlace para volver al panel de administración -->
    <div class="d-flex justify-content-end mt-4 mb-3">
        <a href="/panelAdmin?modal=personal"
        class="btn btn-outline-secondary btn-sm">
            ← Volver al panel admin
        </a>
    </div>

    <h1 class="text-center mb-4">
        Colas asignadas a
        <span th:text="${personal.firstName + ' ' + personal.lastName}"></span>
    </h1>

     <!-- Tabla con las colas disponibles y su estado -->
    <div class="table-responsive">

    <table class="table table-striped table-hover align-middle">

        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th class="text-center">Asignada</th>
                <th class="text-center">Acciones</th>
            </tr>
        </thead>

        <tbody>

            <!-- Filas con cada cola -->
            <!-- Si la cola está asignada, se muestra "Sí" -->
            <!-- Si no lo está, se muestra "No" -->
            <tr th:each="cola : ${colas}"
                class="fila-cola">

                <!-- ID -->
                <td th:text="${cola.id}"></td>

                <!-- NOMBRE -->
                <td th:text="${cola.nombre}">
                    
                </td>

                <!-- ASIGNADA -->
                <td>
                    <div class="d-flex justify-content-center">

                        <span th:if="${colaAsignada[cola.id]}"
                            class="badge bg-success">
                            Sí
                        </span>

                        <span th:unless="${colaAsignada[cola.id]}"
                            class="badge bg-secondary">
                            No
                        </span>

                    </div>
                </td>

                <!-- ACCIONES -->
                <td class="text-center">

                    <!-- ASIGNAR -->
                    <form th:action="@{/user/asignarColaTrabajador}"
                          method="post"
                          style="display:inline;">

                        <input type="hidden" name="trabajadorId" th:value="${personal.id}">
                        <input type="hidden" name="colaId" th:value="${cola.id}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <!-- Botón para asignar una cola al trabajador -->
                        <button class="btn btn-sm btn-success"
                                th:disabled="${colaAsignada[cola.id]}">
                            Asignar
                        </button>

                    </form>

                    <!-- DESASIGNAR -->
                    <form th:action="@{/user/desasignarColaTrabajador}"
                          method="post"
                          style="display:inline;">

                        <input type="hidden" name="trabajadorId" th:value="${personal.id}">
                        <input type="hidden" name="colaId" th:value="${cola.id}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <!-- Botón para quitar una cola al trabajador -->
                        <button class="btn btn-sm btn-danger"
                                th:disabled="${!colaAsignada[cola.id]}">
                            Quitar
                        </button>

                    </form>

                </td>

            </tr>

        </tbody>

    </table>

</div>

</div>

 <!-- Aviso de acceso -->
<div th:unless="${u != null and u.hasRole('ADMIN')}" class="container text-center mt-5">
    <div class="alert alert-danger"><h2>Solo trabajadores o administradores</h2></div>
</div>
</main>
