<!DOCTYPE html>
<html class="h-100" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/head :: header}" />
    <meta charset="UTF-8">
    <title>Seguimiento de Colas</title> <!-- antiguo vista 4 -->

        <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7/bundles/stomp.umd.min.js"></script>
    <style>
        #modalDetalle {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: var(--bs-body-bg, #fff);
            overflow-y: auto;
            padding: 2rem;
        }
        #modalDetalle.visible {
            display: block;
        }
        tr.fila-cola {
            cursor: pointer;
            transition: background 0.15s;
        }
        tr.fila-cola:hover {
            background-color: rgba(13,110,253,0.08) !important;
        }
    </style>
</head>

<body class="d-flex flex-column h-100">
<header th:replace="~{fragments/nav.html :: nav}"></header>

<main class="flex-shrink-0">
<div th:if="${u != null and u.hasRole('ADMIN')}" class="container">

    <h1 class="text-center mb-4">Seguimiento de Cola - Personal</h1>

    <div class="card">
        <div class="card-header"><h2 class="mb-0">Colas disponibles</h2></div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th><th>Nombre</th><th>Personal</th>
                            <th>Nº Esperando</th><th>Tiempo</th><th>Aforo</th>
                            <th>Área / Sala</th><th>Estado</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="cola : ${colas}"
                            class="fila-cola"
                            th:data-cola-id="${cola.id}">
                            <td th:text="${cola.id}"></td>
                            <td th:text="${cola.nombre}"></td>
                            <td th:text="${cola.trabajadores.size()}"></td>
                            <td><span class="badge bg-danger"
                                th:text="${cola.listaClientes != null ? cola.listaClientes.size() : 0}"></span></td>
                            <td th:text="${cola.tiempo}"></td>
                            <td th:text="${cola.capacidad}"></td>
                            <td th:text="${cola.lugar}"></td>
                            <td th:text="${cola.estado}"></td>
                            <td class="text-center" onclick="event.stopPropagation()">
                                <form th:action="@{/colas/{id}/abrir(id=${cola.id})}" method="post" style="display:inline;">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button type="submit" class="btn btn-sm btn-success">Abrir</button>
                                </form>
                                <form th:action="@{/colas/{id}/cerrar(id=${cola.id})}" method="post" style="display:inline;">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button type="submit" class="btn btn-sm btn-danger">Cerrar</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<div th:unless="${u != null and u.hasRole('ADMIN')}" class="container text-center mt-5">
    <div class="alert alert-danger"><h2>Solo administradores</h2></div>
</div>
</main>

<!-- ===================== MODAL FULL-SCREEN ===================== -->
<div id="modalDetalle">

    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
        <h1 id="modal-nombre" class="mb-0">Cola</h1>
        <button class="btn btn-outline-secondary" onclick="cerrarModal()">← Volver a la lista</button>
    </div>

    <!-- Turno actual -->
    <div class="card mb-3 border-success">
        <div class="card-header bg-success text-white">
            <h5 class="mb-0">👤 Atendiendo ahora</h5>
        </div>
        <div class="card-body" id="modal-turno-actual">
            <p class="text-muted">Cargando...</p>
        </div>
    </div>

    <!-- Última persona atendida -->
    <div class="card mb-3 border-secondary">
        <div class="card-header bg-secondary text-white">
            <h5 class="mb-0">🕓 Última persona atendida</h5>
        </div>
        <div class="card-body" id="modal-ultimo-turno">
            <p class="text-muted">Ninguna persona atendida aún.</p>
        </div>
    </div>

    <!-- Lista de espera -->
    <div class="card mb-4">
        <div class="card-header d-flex align-items-center gap-2">
            <h5 class="mb-0">🕐 Lista de espera</h5>
            <span id="modal-badge-espera" class="badge bg-danger">0</span>
        </div>
        <div class="card-body" id="modal-lista-espera">
            <p class="text-muted">Cargando...</p>
        </div>
    </div>

    <!-- Botón llamar siguiente -->
    <div class="d-flex gap-3">
        <button id="btn-siguiente" class="btn btn-success btn-lg" disabled onclick="llamarSiguiente()">
            ▶ Llamar siguiente
        </button>
    </div>

</div>
<!-- ============================================================= -->

<script th:inline="javascript">
    const csrfParam = /*[[${_csrf.parameterName}]]*/ '';
    const csrfToken = /*[[${_csrf.token}]]*/ '';

    let colaIdActual = null;

    document.addEventListener('DOMContentLoaded', function () {

        document.querySelectorAll('tr.fila-cola').forEach(fila => {
            fila.addEventListener('click', () => {
                abrirModal(fila.dataset.colaId);
            });
        });

        // Conexión STOMP
        const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const stompClient = new StompJs.Client({
            brokerURL: wsProtocol + '//' + window.location.host + '/ws',
            reconnectDelay: 5000,
            debug: str => console.log('STOMP:', str),
            connectHeaders: {
                'X-CSRF-TOKEN': csrfToken
            }
        });

        stompClient.onConnect = function () {
            console.log('OK STOMP conectado');

            document.querySelectorAll('tr.fila-cola').forEach(fila => {
                const id = fila.dataset.colaId;
                console.log('OK Suscrito a /topic/cola/' + id + '/actualizar');

                stompClient.subscribe(`/topic/cola/${id}/actualizar`, async function (msg) {
                    console.log('OK Mensaje recibido cola ' + id + ':', msg.body);

                    // Actualizar "N Esperando" en la tabla
                    try {
                        const res = await fetch(`/colas/${id}/detalle`);
                        const cola = await res.json();
                        const filaEl = document.querySelector(`tr[data-cola-id="${id}"]`);
                        if (filaEl) {
                            filaEl.querySelector('.badge.bg-danger').textContent =
                                cola.listaClientes.length;
                        }
                        // Si el modal de esa cola está abierto, refrescarlo también
                        if (colaIdActual === id) {
                            renderModal(cola);
                        }
                    } catch (e) {
                        console.error('Error actualizando cola ' + id, e);
                    }
                });
            });
        };

        stompClient.onStompError = function (frame) {
            console.error('ERR Error STOMP:', frame);
        };

        stompClient.onDisconnect = function () {
            console.warn('ERR STOMP desconectado');
        };

        stompClient.activate();
    });

    async function abrirModal(colaId) {
        colaIdActual = colaId;
        document.getElementById('modalDetalle').classList.add('visible');
        document.body.style.overflow = 'hidden';
        window.scrollTo(0, 0);

        try {
            const res = await fetch(`/colas/${colaId}/detalle`);
            const cola = await res.json();
            renderModal(cola);
        } catch(e) {
            document.getElementById('modal-turno-actual').innerHTML =
                '<p class="text-danger">Error al cargar los datos.</p>';
        }
    }

    function renderModal(cola) {
        document.getElementById('modal-nombre').textContent = cola.nombre;

        // Turno actual
        const turnoDiv = document.getElementById('modal-turno-actual');
        if (cola.turnoActual) {
            turnoDiv.innerHTML = `
                <p class="fs-4 mb-1"><strong>Número de turno:</strong>
                    <span class="badge bg-success fs-5">${cola.turnoActual}</span>
                </p>
                <p class="mb-1"><strong>Hora de inicio:</strong> ${cola.inicioTurnoActual ?? '-'}</p>
                <p class="mb-0"><strong>Tiempo transcurrido:</strong> ${cola.minutosTurnoActual} minutos</p>`;
        } else {
            turnoDiv.innerHTML = '<p class="text-muted">Ninguna persona siendo atendida ahora mismo.</p>';
        }

        // Última persona atendida
        const ultimoDiv = document.getElementById('modal-ultimo-turno');
        if (cola.ultimoTurno) {
            ultimoDiv.innerHTML = `
                <p class="mb-1"><strong>Número de turno:</strong> ${cola.ultimoTurno}</p>
                <p class="mb-1"><strong>Hora de inicio:</strong> ${cola.inicioUltimoTurno ?? '-'}</p>
                <p class="mb-1"><strong>Hora de fin:</strong> ${cola.finUltimoTurno ?? '-'}</p>
                <p class="mb-0"><strong>Tiempo total:</strong> ${cola.minutosUltimoTurno} minutos</p>`;
        } else {
            ultimoDiv.innerHTML = '<p class="text-muted">Ninguna persona atendida aún.</p>';
        }

        // Lista de espera
        const listaDiv = document.getElementById('modal-lista-espera');
        document.getElementById('modal-badge-espera').textContent = cola.listaClientes.length;

        if (cola.listaClientes.length === 0) {
            listaDiv.innerHTML = '<p class="text-muted">No hay nadie esperando.</p>';
        } else {
            const items = cola.listaClientes.map((c, i) => `
                <li class="list-group-item d-flex justify-content-between align-items-center">
                    <span>${c.username}</span>
                    ${i === 0 ? '<span class="badge bg-warning text-dark">Siguiente</span>' : '<span></span>'}
                </li>`).join('');
            listaDiv.innerHTML = `<ol class="list-group list-group-numbered">${items}</ol>`;
        }

        document.getElementById('btn-siguiente').disabled = cola.listaClientes.length === 0;
    }

    async function llamarSiguiente() {
        try {
            const res = await fetch(`/colas/${colaIdActual}/siguiente`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRF-TOKEN': csrfToken
                }
            });

            if (res.ok) {
                const datosRes = await fetch(`/colas/${colaIdActual}/detalle`);
                const cola = await datosRes.json();
                renderModal(cola);
            } else {
                alert('Error al llamar siguiente: ' + res.status);
            }
        } catch(e) {
            alert('Error al llamar al siguiente: ' + e);
        }
    }

    function cerrarModal() {
        document.getElementById('modalDetalle').classList.remove('visible');
        document.body.style.overflow = '';
        colaIdActual = null;
    }

    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') cerrarModal();
    });

    // Actualizar datos del modal cada 60 segundos
    setInterval(async () => {
        if (colaIdActual !== null) {
            const res = await fetch(`/colas/${colaIdActual}/detalle`);
            const cola = await res.json();
            renderModal(cola);
        }
    }, 60000);
</script>

</body>
</html>
